<!DOCTYPE html>
<html>
<head>
<title>TB Vyrux</title>

<style>

body{
margin:0;
background:black;
color:#b7ff7a;
font-family:Verdana;
}

/* grid background */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(#00ff88 1px, transparent 1px),
linear-gradient(90deg,#00ff88 1px, transparent 1px);
background-size:40px 40px;
opacity:0.15;
z-index:-1;
}

/* main container */
.container{
width:1100px;
margin:auto;
padding:20px;
}

/* top banner */
.banner{
border:3px solid #00ff88;
padding:10px;
margin-bottom:20px;
text-align:center;
font-size:28px;
letter-spacing:3px;
}

/* layout grid */
.layout{
display:grid;
grid-template-columns:250px 1fr 220px;
gap:15px;
}

/* panels */
.panel{
border:3px solid #00ff88;
padding:15px;
background:rgba(0,0,0,0.8);
}

/* character image */
.character img{
width:100%;
border:2px solid #00ff88;
}

/* gallery images */
.gallery img{
width:100%;
margin-bottom:10px;
border:2px solid #00ff88;
}

/* headers */
h2{
border-bottom:2px solid #00ff88;
padding-bottom:5px;
}

</style>
</head>

<body>

<div class="container">

<div class="banner">
Intro !!
</div>

<div class="layout">

<!-- LEFT PANEL -->
<div class="panel character">

<img src="character.png">

<h2>INFO</h2>

<p><b>Name:</b> Ash</p>
<p><b>Age:</b> 16</p>
<p><b>pronouns:</b> Any! </p>

</div>

<!-- CENTER PANEL -->
<div class="panel">

<h1>More !! </h1>

<p>
Im learning HTML so im trying to make a portfolio website
</p>

<h2>Likes</h2>

<ul>
<li>Drawing </li>
<li>Halloween</li>
<li>Green</li>
<li>Ceramics</li>
</ul>

<h2>Dislikes</h2>

<ul>
<li>the color yellow</li>
<li>the heat</li>
<li>Math</li>
</ul>

</div>

<!-- RIGHT PANEL -->
<div class="panel gallery">

<h2>Gallery</h2>

<img src="art1.png">
<img src="art2.png">
<img src="art3.png">

</div>

</div>
</div>

</body>
</html>
